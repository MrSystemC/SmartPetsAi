pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(settingsDir, 'local.properties')
        if (!localPropertiesFile.exists()) {
            throw new GradleException('local.properties not found. Run `flutter pub get` or create the file with flutter.sdk path.')
        }
        localPropertiesFile.withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty('flutter.sdk')
        if (flutterSdkPath == null) {
            throw new GradleException('flutter.sdk not set in local.properties')
        }
        return flutterSdkPath
    }()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'dev.flutter.flutter-plugin-loader' version '1.0.0'
    id 'com.android.application' version '8.7.3' apply false
    id 'org.jetbrains.kotlin.android' version '2.0.21' apply false
}

include ':app'
